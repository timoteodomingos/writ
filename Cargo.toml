[package]
name = "writ"
version = "0.2.0"
description = "A hybrid markdown editor that seamlessly combines raw text editing with live inline rendering"
authors = ["Wilfred Denton <wilfred@hey.com>"]
license = "MIT"
edition = "2024"

[lints.clippy]
too_many_arguments = "allow"

[[bin]]
name = "writ"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4.5", features = ["derive", "env"] }
futures = "0.3"
gpui = "0.2"
open = "5"
ropey = "1.6"
smol = "2"
tree-sitter = "0.26"
tree-sitter-highlight = "0.26"
tree-sitter-md = "0.5"
tree-sitter-rust = "0.24"
undo = "0.52"
ureq = { version = "3", features = ["rustls"] }
